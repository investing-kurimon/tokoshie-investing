<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Reigns the Markets - tokoshie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --text-main: #d1d5db;
            --text-sub: #868e96;
            --accent: #4ade80; /* 生命線（ミドルバンド）を想起させる清らかなグリーン */
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 750px;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .logo-area {
            margin-bottom: 50px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            letter-spacing: 0.18em;
            color: #ffffff;
            margin: 0 0 10px 0;
            font-weight: 400;
            line-height: 1.2;
        }
        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 0.25em;
            color: var(--accent);
            font-weight: 600;
        }
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--text-sub), transparent);
            margin: 40px auto;
            width: 60%;
        }
        p {
            font-size: 0.95rem;
            line-height: 2.2;
            letter-spacing: 0.12em;
            color: var(--text-main);
            margin-bottom: 40px;
        }
        .quote {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-style: italic;
            letter-spacing: 0.08em;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <h1>Time Reigns the Markets</h1>
            <div class="subtitle">Not "They"</div>
        </div>
        
        <hr>

        <p>
            市場は、エントロピーに健気に抵抗する人間の思惑を燃料に育つ生命体である。<br>
            そして、その絶対的な支配者は「彼ら（資本家）」ではなく、不死の「時間」に他ならない。<br>
            私たちは無駄なノイズを削ぎ落とし、生命線と時間の歪みのみを凝視する。<br>
            ここは、仮構の不死を追う狂乱から離れ、冷徹な真理と同調するための聖域。
        </p>

        <hr>
        
        <div class="quote">
            "Anyone Who Knows What the Market Is (Will Understand)"
        </div>
    </div>
</body>
</html>
