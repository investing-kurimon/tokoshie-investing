<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - tokoshie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --text-main: #d1d5db;
            --text-sub: #868e96;
            --accent: #4ade80;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 400;
            margin-bottom: 20px;
        }
        p {
            font-size: 0.95rem;
            line-height: 2;
            letter-spacing: 0.08em;
            color: var(--text-main);
            margin-bottom: 40px;
        }
        a {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            color: var(--text-sub);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        a:hover { color: var(--accent); border-bottom: 1px solid var(--accent); }
    </style>
</head>
<body>
    <h1>Thank You</h1>
    <p>
        お問い合わせありがとうございます。<br>
        通常3営業日以内にご返信します。
    </p>
    <a href="index.html">&laquo; トップページへ戻る</a>
</body>
</html>
